  <rect x="208" y="704" width="120" height="22" rx="5" fill="#101828" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="268" y="719" text-anchor="middle" fill="#3b82f6" font-size="9">Dispatcher Registry</text>

  <rect x="335" y="704" width="110" height="22" rx="5" fill="#101828" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
