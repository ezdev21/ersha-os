  <rect x="1140" y="977" width="50" height="25" rx="6" fill="#0d1a1f" stroke="#60b5cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1165" y="994" text-anchor="middle" fill="#60b5cc" font-size="11" font-weight="600">Elm</text>
  <rect x="1200" y="977" width="60" height="25" rx="6" fill="#1a0d1f" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="1230" y="994" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="600">Tokio</text>
