  <text x="68" y="647" fill="#555" font-size="11">Core backend services</text>

  <!-- Prime box -->
  <rect x="80" y="665" width="380" height="125" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="104" y="692" fill="#3b82f6" font-size="17" font-weight="700">ersha-prime</text>

  <rect x="96" y="704" width="105" height="22" rx="5" fill="#101828" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
