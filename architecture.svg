  <text x="1031" y="904" fill="#e8e8e8" font-size="12" font-weight="700">ersha-dispatchers-harness</text>
  <text x="1031" y="922" fill="#888" font-size="10">Integration test harness</text>
  <text x="1031" y="938" fill="#666" font-size="10">Simulated dispatchers &amp; devices</text>

  <!-- Tech badges -->
