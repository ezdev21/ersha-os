  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="840" width="1320" height="175" rx="12" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="68" y="868" fill="#888" font-size="12" font-weight="700" letter-spacing="3">SHARED CRATES</text>

