  <text x="514" y="692" fill="#60b5cc" font-size="15" font-weight="700">ersha-registry</text>
  <text x="652" y="692" fill="#555" font-size="11">Elm SPA</text>

  <rect x="506" y="704" width="120" height="22" rx="5" fill="#0d1a1f" stroke="#60b5cc" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="566" y="719" text-anchor="middle" fill="#60b5cc" font-size="9">Summary Stats</text>

  <rect x="634" y="704" width="140" height="22" rx="5" fill="#0d1a1f" stroke="#60b5cc" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="704" y="719" text-anchor="middle" fill="#60b5cc" font-size="9">List Views</text>

  <rect x="506" y="732" width="120" height="22" rx="5" fill="#0d1a1f" stroke="#60b5cc" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="566" y="747" text-anchor="middle" fill="#60b5cc" font-size="9">Registration Forms</text>

  <rect x="634" y="732" width="140" height="22" rx="5" fill="#0d1a1f" stroke="#60b5cc" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="704" y="747" text-anchor="middle" fill="#60b5cc" font-size="9">Detail Modals</text>

  <text x="506" y="776" fill="#555" font-size="10">Compiled and embedded into ersha-prime binary</text>

  <!-- Arrow: prime -> registry -->
  <line x1="460" y1="727" x2="487" y2="727" stroke="#444" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- TIER 4: DATA / ANALYTICS (bottom-right) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="850" y="600" width="510" height="210" rx="12" fill="#130d1a" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="878" y="629" fill="#a855f7" font-size="12" font-weight="700" letter-spacing="3">DATA &amp; ANALYTICS TIER</text>
  <text x="878" y="647" fill="#555" font-size="11">Storage and visualization</text>

  <!-- ClickHouse -->
  <rect x="880" y="665" width="220" height="56" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="904" y="692" fill="#a855f7" font-size="14" font-weight="700">ClickHouse</text>
  <text x="904" y="710" fill="#666" font-size="10">Time-series analytics database</text>

  <!-- SQLite -->
  <rect x="1120" y="665" width="210" height="56" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="1144" y="692" fill="#a855f7" font-size="14" font-weight="700">SQLite</text>
  <text x="1144" y="710" fill="#666" font-size="10">Local / dev storage backend</text>

  <!-- Grafana -->
  <rect x="880" y="740" width="220" height="56" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="904" y="767" fill="#f59e0b" font-size="14" font-weight="700">Grafana</text>
  <text x="904" y="785" fill="#666" font-size="10">Visualization dashboards</text>

  <!-- Alerts -->
  <rect x="1120" y="740" width="210" height="56" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="1144" y="767" fill="#ef4444" font-size="14" font-weight="700">Alerts</text>
  <text x="1144" y="785" fill="#666" font-size="10">Logged server-side</text>

  <!-- Arrow: Prime -> Data -->
  <line x1="820" y1="727" x2="847" y2="727" stroke="#444" stroke-width="1.5" marker-end="url(#arrow-dim)"/>

  <!-- Arrow: ClickHouse -> Grafana -->
