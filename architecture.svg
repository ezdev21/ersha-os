  <text x="96" y="922" fill="#888" font-size="10">Shared domain types &amp; logic</text>
  <text x="96" y="938" fill="#666" font-size="10">Devices, sensors, alerts, H3 cells</text>

  <!-- ersha-rpc -->
  <rect x="395" y="882" width="295" height="70" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="411" y="904" fill="#e8e8e8" font-size="12" font-weight="700">ersha-rpc</text>
  <text x="411" y="922" fill="#888" font-size="10">Binary RPC framing layer</text>
  <text x="411" y="938" fill="#666" font-size="10">Postcard serialization + TLS</text>

  <!-- ersha-tls -->
  <rect x="705" y="882" width="295" height="70" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="721" y="904" fill="#e8e8e8" font-size="12" font-weight="700">ersha-tls</text>
  <text x="721" y="922" fill="#888" font-size="10">Certificate management</text>
  <text x="721" y="938" fill="#666" font-size="10">Root CA, mTLS via Rustls</text>

  <!-- ersha-dispatchers-harness -->
