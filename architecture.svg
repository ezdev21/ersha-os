  <rect x="224" y="732" width="90" height="22" rx="5" fill="#101828" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="269" y="747" text-anchor="middle" fill="#3b82f6" font-size="9">HTTP API</text>

  <rect x="322" y="732" width="90" height="22" rx="5" fill="#101828" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="367" y="747" text-anchor="middle" fill="#3b82f6" font-size="9">RPC Server</text>

  <text x="96" y="776" fill="#555" font-size="10">HTTP | RPC (TLS) | Pluggable storage</text>

