<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1030" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-dim" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1030" fill="#0a0a0a" rx="0"/>

  <!-- Title -->
  <text x="700" y="52" text-anchor="middle" fill="#e8e8e8" font-size="28" font-weight="700" letter-spacing="-0.5">Ersha OS Architecture</text>
  <text x="700" y="78" text-anchor="middle" fill="#555" font-size="14" letter-spacing="3" font-weight="400">SMART AGRICULTURE MONITORING PLATFORM</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- TIER 1: EDGE (top) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="105" width="1320" height="195" rx="12" fill="#0d1a0d" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="68" y="134" fill="#22c55e" font-size="12" font-weight="700" letter-spacing="3">EDGE TIER</text>
  <text x="68" y="152" fill="#555" font-size="11">Sensor devices in the field</text>

  <!-- Edge Device 1 -->
  <rect x="80" y="170" width="230" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <circle cx="104" cy="196" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="104" y="200" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">1</text>
  <text x="120" y="200" fill="#e8e8e8" font-size="14" font-weight="600">ersha-edge</text>
  <text x="96" y="222" fill="#888" font-size="11">Embedded SDK (no_std)</text>
  <text x="96" y="240" fill="#666" font-size="10">Embassy, Sensor/Transport traits</text>

  <!-- Edge Device 2 -->
  <rect x="390" y="170" width="230" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <circle cx="414" cy="196" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="414" y="200" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">2</text>
  <text x="430" y="200" fill="#e8e8e8" font-size="14" font-weight="600">ersha-edge</text>
  <text x="406" y="222" fill="#888" font-size="11">Embedded SDK (no_std)</text>
  <text x="406" y="240" fill="#666" font-size="10">Embassy, Sensor/Transport traits</text>

  <!-- Edge Device 3 -->
  <rect x="700" y="170" width="230" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <circle cx="724" cy="196" r="10" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="724" y="200" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700">3</text>
  <text x="740" y="200" fill="#e8e8e8" font-size="14" font-weight="600">ersha-edge</text>
  <text x="716" y="222" fill="#888" font-size="11">Embedded SDK (no_std)</text>
  <text x="716" y="240" fill="#666" font-size="10">Embassy, Sensor/Transport traits</text>

  <!-- Ellipsis device -->
  <rect x="1010" y="170" width="120" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1070" y="225" text-anchor="middle" fill="#555" font-size="24" letter-spacing="4">...</text>
  <text x="1070" y="250" text-anchor="middle" fill="#444" font-size="11">N devices</text>

  <!-- Protocol label: Edge -> Dispatch -->
  <rect x="1210" y="175" width="130" height="100" rx="8" fill="#0d1a0d" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="1275" y="200" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">PROTOCOL</text>
  <text x="1275" y="220" text-anchor="middle" fill="#888" font-size="10">Postcard binary</text>
  <text x="1275" y="236" text-anchor="middle" fill="#888" font-size="10">Framed packets</text>
  <text x="1275" y="252" text-anchor="middle" fill="#888" font-size="10">WiFi TCP</text>
  <text x="1275" y="268" text-anchor="middle" fill="#555" font-size="10">LoRaWAN (planned)</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Arrows: Edge -> Dispatch -->
  <!-- ════════════════════════════════════════════ -->
  <line x1="195" y1="300" x2="195" y2="345" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" stroke-opacity="0.7"/>
  <line x1="505" y1="300" x2="505" y2="345" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" stroke-opacity="0.7"/>
  <line x1="815" y1="300" x2="815" y2="345" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" stroke-opacity="0.7"/>
  <text x="1200" y="330" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600" letter-spacing="1">POSTCARD BINARY FRAMES</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- TIER 2: DISPATCH (middle) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="350" width="1320" height="195" rx="12" fill="#1a1510" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="68" y="379" fill="#f59e0b" font-size="12" font-weight="700" letter-spacing="3">DISPATCH TIER</text>
  <text x="68" y="397" fill="#555" font-size="11">Gateway nodes near the farms</text>

  <!-- Dispatcher 1 -->
  <rect x="80" y="415" width="350" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="104" y="442" fill="#f59e0b" font-size="15" font-weight="700">ersha-dispatch</text>
  <text x="260" y="442" fill="#555" font-size="11">Region A</text>

  <rect x="96" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="146" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">TCP Receiver</text>

  <rect x="204" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="254" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">SQLite Buffer</text>

  <rect x="312" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="362" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">Batch Upload</text>

  <text x="96" y="504" fill="#666" font-size="10">Receives edge frames, buffers locally, batches &amp; relays to prime</text>
  <text x="96" y="518" fill="#555" font-size="10">HTTP health | Pluggable storage backends</text>

  <!-- Dispatcher 2 -->
  <rect x="460" y="415" width="350" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="484" y="442" fill="#f59e0b" font-size="15" font-weight="700">ersha-dispatch</text>
  <text x="640" y="442" fill="#555" font-size="11">Region B</text>

  <rect x="476" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="526" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">TCP Receiver</text>

  <rect x="584" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="634" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">SQLite Buffer</text>

  <rect x="692" y="454" width="100" height="24" rx="5" fill="#1a1510" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="742" y="470" text-anchor="middle" fill="#f59e0b" font-size="10">Batch Upload</text>

  <text x="476" y="504" fill="#666" font-size="10">Receives edge frames, buffers locally, batches &amp; relays to prime</text>
  <text x="476" y="518" fill="#555" font-size="10">HTTP health | Pluggable storage backends</text>

  <!-- Dispatcher N -->
  <rect x="840" y="415" width="160" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="920" y="468" text-anchor="middle" fill="#555" font-size="24" letter-spacing="4">...</text>
  <text x="920" y="495" text-anchor="middle" fill="#444" font-size="11">N dispatchers</text>

  <!-- RPC protocol label -->
  <rect x="1050" y="415" width="280" height="110" rx="8" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="1074" y="442" fill="#f59e0b" font-size="12" font-weight="600">ersha-rpc</text>
  <text x="1074" y="462" fill="#888" font-size="11">Custom binary RPC protocol</text>
  <text x="1074" y="480" fill="#666" font-size="10">Postcard framing + TLS (Rustls)</text>
  <text x="1074" y="496" fill="#666" font-size="10">ULID message correlation</text>
  <text x="1074" y="512" fill="#666" font-size="10">Ping, Hello, BatchUpload, Alert</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- Arrows: Dispatch -> Central -->
  <!-- ════════════════════════════════════════════ -->
  <line x1="255" y1="545" x2="450" y2="595" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-dim)" stroke-opacity="0.6"/>
  <line x1="635" y1="545" x2="635" y2="595" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-dim)" stroke-opacity="0.6"/>
  <line x1="920" y1="545" x2="780" y2="595" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-dim)" stroke-opacity="0.6"/>
  <text x="1200" y="578" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" letter-spacing="1">RPC OVER TLS</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- TIER 3: CENTRAL (bottom-left) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="40" y="600" width="780" height="210" rx="12" fill="#101828" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
